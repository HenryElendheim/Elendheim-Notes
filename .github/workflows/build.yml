name: Build

on:
  push:
    branches: [testing, main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, like 1.0. Leave empty for a plain build."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Name APK after the version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          VERSION="${GITHUB_SHA::7}"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then VERSION="${GITHUB_REF_NAME#v}"; fi
          if [ -n "${INPUT_VERSION}" ]; then VERSION="${INPUT_VERSION}"; fi
          cp app/build/outputs/apk/release/app-release.apk "elendheim-notes-${VERSION}.apk"
          echo "APK_NAME=elendheim-notes-${VERSION}.apk" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=v${VERSION}" >> "$GITHUB_ENV"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: elendheim-notes-apk
          path: ${{ env.APK_NAME }}

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.version != '')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: ${{ env.APK_NAME }}
          generate_release_notes: false
          body: |
            Elendheim Notes is a private note app for Android. It keeps notes and checklists organized in folders, backs everything up to a single file when you ask, and stores it all on your phone only.

            Download the APK below and install it on any Android 8.0 or newer phone.
