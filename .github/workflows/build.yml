name: Build

on:
  push:
    branches: [testing, main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Name APK after the version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [ "${GITHUB_REF_TYPE}" != "tag" ]; then VERSION="${GITHUB_SHA::7}"; fi
          cp app/build/outputs/apk/release/app-release.apk "elendheim-notes-${VERSION}.apk"
          echo "APK_NAME=elendheim-notes-${VERSION}.apk" >> "$GITHUB_ENV"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: elendheim-notes-apk
          path: ${{ env.APK_NAME }}

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.APK_NAME }}
          generate_release_notes: false
          body: |
            Elendheim Notes ${{ github.ref_name }}

            Download the APK below and install it on any Android 8.0+ phone.
            Notes are stored on your device only; the app has no network permission.
